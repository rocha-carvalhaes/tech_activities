<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" role="img" aria-label="Baú do tesouro aberto">
  <defs>
    <linearGradient id="ct-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#f6e8c8"/>
    </linearGradient>
    <radialGradient id="ct-glow" cx="50%" cy="54%" r="46%">
      <stop offset="0%" stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="200" fill="url(#ct-bg)"/>
  <ellipse cx="200" cy="108" rx="160" ry="96" fill="url(#ct-glow)"/>

  <!-- baú aberto (mesma arte da tela do tesouro) -->
  <g transform="translate(72 -23) scale(1.25)">
    <!-- sombra de contato -->
    <ellipse cx="100" cy="170" rx="70" ry="10" fill="rgba(0,0,0,0.10)"/>

    <!-- brilho + estrela do tesouro (atrás da tampa) -->
    <circle cx="100" cy="92" r="34" fill="#fde68a" opacity="0.95"/>
    <path d="M100 66 l7 16 17 2 -13 12 4 17 -15 -9 -15 9 4 -17 -13 -12 17 -2 z"
          fill="#f6c945" stroke="#d9a520" stroke-width="2" stroke-linejoin="round"/>

    <!-- tampa aberta -->
    <g transform="rotate(-58 100 92)">
      <path d="M44 92 V70 a56 40 0 0 1 112 0 V92 Z"
            fill="#c98a4b" stroke="#8a5a2b" stroke-width="4" stroke-linejoin="round"/>
      <rect x="92" y="70" width="16" height="22" rx="2" fill="#e9b765" stroke="#8a5a2b" stroke-width="3"/>
    </g>

    <!-- corpo do baú -->
    <rect x="42" y="92" width="116" height="74" rx="8" fill="#c98a4b" stroke="#8a5a2b" stroke-width="4"/>
    <rect x="42" y="112" width="116" height="12" fill="#e9b765" stroke="#8a5a2b" stroke-width="2"/>
  </g>
</svg>
